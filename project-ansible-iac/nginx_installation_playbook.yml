---
- name: Install and Enable Nginx on Ubuntu Target Server
  hosts: webservers
  become: yes

  tasks:
    - name: Install Nginx Package
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Ensure Nginx is started and enabled
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: yes
