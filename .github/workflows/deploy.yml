name: CI/CD Docker Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/nginx-demo
          tags: |
            type=sha,prefix=

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy via Ansible
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy with Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 192.168.18.36 >> ~/.ssh/known_hosts
          ssh-keyscan -H 192.168.18.35 >> ~/.ssh/known_hosts
          ansible-playbook -i inventory.ini deploy_containers.yml \
            --extra-vars "docker_image=${{ secrets.DOCKERHUB_USERNAME }}/nginx-demo:${IMAGE_TAG}"
