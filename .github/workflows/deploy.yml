      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
        run: |
          mkdir -p ~/.ssh
          # Use quotes around the secret to handle multi-line keys
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Only run keyscan if the secrets are not empty
          if [ -n "${{ secrets.IP_UBUNTU }}" ]; then ssh-keyscan -H ${{ secrets.IP_UBUNTU }} >> ~/.ssh/known_hosts; fi
          if [ -n "${{ secrets.IP_CENTOS }}" ]; then ssh-keyscan -H ${{ secrets.IP_CENTOS }} >> ~/.ssh/known_hosts; fi
          
          # Execute with more verbose output to see errors
          ansible-playbook -i inventory.ini deploy_containers.yml --private-key ~/.ssh/id_rsa -vv
