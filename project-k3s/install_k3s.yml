---
# ─────────────────────────────────────────────
# Play 1 — Install K3s Master on Control Node
# ─────────────────────────────────────────────
- name: Install K3s Master
  hosts: control_node
  become: yes
  connection: local

  tasks:
    - name: Check if K3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Install K3s master
      shell: |
        curl -sfL https://get.k3s.io | \
        INSTALL_K3S_EXEC="--disable traefik --node-ip {{ ansible_host }}" sh -
      when: not k3s_binary.stat.exists

    - name: Wait for K3s to be ready
      systemd:
        name: k3s
        state: started
        enabled: yes

    - name: Wait for node to become Ready
      shell: kubectl get nodes | grep "control-plane" | grep "Ready"
      register: node_ready
      retries: 10
      delay: 10
      until: node_ready.rc == 0

    - name: Get node join token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token

    - name: Set token fact for use in next play
      set_fact:
        k3s_node_token: "{{ k3s_token.content | b64decode | trim }}"

    - name: Copy kubeconfig for labadmin user
      block:
        - name: Create .kube directory
          file:
            path: /home/labadmin/.kube
            state: directory
            owner: labadmin
            group: labadmin
            mode: '0755'

        - name: Copy kubeconfig
          copy:
            src: /etc/rancher/k3s/k3s.yaml
            dest: /home/labadmin/.kube/config
            owner: labadmin
            group: labadmin
            mode: '0600'
            remote_src: yes

# ─────────────────────────────────────────────
# Play 2 — Join Worker Nodes to the Cluster
# ─────────────────────────────────────────────
- name: Join Worker Nodes
  hosts: workers
  become: yes

  vars:
    master_ip: "192.168.18.10"

  tasks:
    - name: Check if K3s agent already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_agent_binary

    - name: Install curl (Ubuntu)
      apt:
        name: curl
        state: present
        update_cache: yes
      when:
        - not k3s_agent_binary.stat.exists
        - ansible_distribution == "Ubuntu"

    - name: Install curl (CentOS)
      yum:
        name: curl
        state: present
      when:
        - not k3s_agent_binary.stat.exists
        - ansible_distribution == "CentOS"

    - name: Join worker to K3s cluster
      shell: |
        curl -sfL https://get.k3s.io | \
        K3S_URL=https://{{ master_ip }}:6443 \
        K3S_TOKEN={{ hostvars[groups['control_node'][0]]['k3s_node_token'] }} \
        sh -
      when: not k3s_agent_binary.stat.exists

    - name: Ensure K3s agent is running
      systemd:
        name: k3s-agent
        state: started
        enabled: yes

# ─────────────────────────────────────────────
# Play 3 — Verify All Nodes Are Ready
# ─────────────────────────────────────────────
- name: Verify Cluster Health
  hosts: control_node
  become: yes
  connection: local

  tasks:
    - name: Wait for all nodes to be Ready
      shell: kubectl get nodes | grep -c "Ready"
      register: ready_nodes
      retries: 12
      delay: 10
      until: ready_nodes.stdout | int >= 3

    - name: Show cluster nodes
      shell: kubectl get nodes -o wide
      register: nodes_output

    - name: Print cluster status
      debug:
        msg: "{{ nodes_output.stdout_lines }}"
